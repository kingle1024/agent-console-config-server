name: docker-publish

# main 푸시 또는 수동 실행 시 Docker 이미지를 빌드해 Docker Hub(ejy1024)로 push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ejy1024/agent-console-config-server:latest
            ejy1024/agent-console-config-server:0.0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max
