server:
  # cloudtype 등은 PORT 환경변수를 주입 → 없으면 8888
  port: ${PORT:8888}

spring:
  application:
    name: agent-console-config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # 클래스패스의 config/ 폴더에서 설정 파일을 읽는다(agent-console.yml → /agent-console/default)
          search-locations: classpath:/config
  security:
    user:
      name: ${CONFIG_USER:agent}
      # ★운영(cloudtype)에서는 반드시 CONFIG_PASSWORD 환경변수로 강한 값 지정★ 기본값은 로컬 테스트용
      password: ${CONFIG_PASSWORD:changeme-local}
      roles: USER
  # 개선/오류 리포트 저장용 MariaDB. ★접속정보는 cloudtype 환경변수(DB_URL/DB_USER/DB_PASSWORD)로 주입★
  # createDatabaseIfNotExist=true → 스키마 없으면 생성. 운영은 전용 계정 권장(root 지양).
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/agent_console?createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # 운영 초기엔 테이블 자동 생성/갱신. 안정화 후 validate 로 낮추는 것 권장.
      ddl-auto: update
    open-in-view: false
  # 방화벽 첨부 업로드(/api/firewalls/upload) 멀티파트 한도. 동의서/서버리스트는 작은 파일이므로 넉넉히 제한.
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

# Cloudflare R2(S3) — 방화벽 첨부를 서버가 직접 업로드(쓰기 키는 ★서버 환경변수에만★ 둔다).
#  - account-id/bucket/public-base 는 비밀 아님(공개 URL 자체가 공개용). 기본값 내장 — 필요 시 env 로 덮어쓰기.
#  - access-key-id/secret-access-key 는 ★비밀★. cloudtype 환경변수 R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY 로 주입.
#    미설정이면 /api/firewalls/upload 는 503 → 앱은 "관리자에게 서버 R2 설정 요청" 안내.
r2:
  account-id: ${R2_ACCOUNT_ID:fc0480a6980d228ee7d1ce69e2e24efe}
  bucket: ${R2_BUCKET:jybuckey}
  public-base: ${R2_PUBLIC_BASE:https://pub-bf7ab8cf70774a3ba215553cefc74099.r2.dev}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}

# 리포트 API 인증 — 앱이 보내는 X-Api-Key 헤더가 이 값과 같아야 통과(비우면 검증 생략=로컬).
# ★cloudtype 환경변수 REPORTS_API_KEY 로 주입하고, agent-console.yml 의 reportsApi.apiKey 와 같은 값으로★
reports:
  api-key: ${REPORTS_API_KEY:}

# 쪽지 발송 프록시(/api/memo)가 쓰는 아마란스(apiproxy) 토큰. ★cloudtype 환경변수로 주입★
#  - apiproxy redis 에 등록된 토큰이라야 한다(NSM qrLogin 토큰은 152). 만료되면 여기(env)만 갱신.
#  - 미설정이면 /api/memo 는 503 → 앱은 기존 직접 발송으로 폴백.
amaranth:
  access-token: ${AMARANT_ACCESS_TOKEN:}
  secret-key: ${AMARANT_SECRET_KEY:}
  group-seq: ${AMARANT_GROUP_SEQ:duzon}

# {cipher} 복호화 키 — ★repo 에 두지 말고 환경변수 ENCRYPT_KEY 로만 주입★ (없으면 로컬 테스트 키)
encrypt:
  key: ${ENCRYPT_KEY:local-dev-encrypt-key-please-change}

management:
  endpoints:
    web:
      exposure:
        include: health,info
