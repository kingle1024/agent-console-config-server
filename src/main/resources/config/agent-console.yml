# 개선/오류 리포트 API — 앱이 config-server 의 /api/reports 를 호출할 때 쓰는 키/관리자.
#  apiKey   : X-Api-Key 헤더로 전송 → 서버의 REPORTS_API_KEY(환경변수)와 ★같은 값★이어야 함.
#             아래 PLACEHOLDER 를 실제 키의 {cipher} 암호문으로 교체:
#             printf '%s' '실제키' | curl -u $CONFIG_USER:$CONFIG_PASSWORD -H 'Content-Type: text/plain' --data-binary @- $URL/encrypt
#  adminId  : 관리자(전체 조회·답변·상태변경) userid. 비밀 아님(평문).
reportsApi:
  # 서버 환경변수 REPORTS_API_KEY 와 ★같은 값★. 현재 cloudtype env = FI.
  # (보안 강화하려면 더 긴 키로 바꾸고, $URL/encrypt 로 '{cipher}...' 암호화해 교체 권장)
  apiKey: 'FI'
  adminId: 'ejy10241'
